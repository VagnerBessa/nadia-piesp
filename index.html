<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Nadia AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" />
  <script type="importmap">
{
  "imports": {
    "@heroicons/react/": "https://aistudiocdn.com/@heroicons/react@^2.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "firebase-functions/": "https://aistudiocdn.com/firebase-functions@^7.0.0/",
    "cors": "https://aistudiocdn.com/cors@^2.8.5",
    "@mui/material/": "https://aistudiocdn.com/@mui/material@^5.15.0/",
    "@mui/material": "https://aistudiocdn.com/@mui/material@^5.15.0",
    "@emotion/react": "https://aistudiocdn.com/@emotion/react@^11.11.0",
    "@emotion/styled": "https://aistudiocdn.com/@emotion/styled@^11.11.0",
    "recharts": "https://aistudiocdn.com/recharts@^2.12.0"
  }
}
</script>
<style>
  body {
    /* Deep ocean teal — matching the reference design */
    background-color: #0b2231;
    background-image:
      radial-gradient(ellipse 120% 80% at 50% 50%, #0d2b3e 0%, #081a27 60%, #05111a 100%),
      radial-gradient(ellipse 70% 40% at 50% 0%, rgba(244, 63, 94, 0.10) 0%, transparent 65%);
    background-repeat: no-repeat;
    background-size: 100% 100%;
    background-attachment: fixed;
    /* Respeita notch e home indicator do iOS */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  /* Input area respeita teclado virtual no iOS/Android */
  .pb-safe {
    padding-bottom: max(2rem, env(safe-area-inset-bottom));
  }
  @keyframes capivara-breathe {
    0%, 100% { transform: scaleY(1) translateY(0); }
    50%       { transform: scaleY(0.975) translateY(1px); }
  }
  @keyframes capivara-tilt {
    0%, 55%, 100% { transform: rotate(0deg); }
    62%           { transform: rotate(5deg); }
    75%           { transform: rotate(-3deg); }
    88%           { transform: rotate(2deg); }
  }
  @keyframes capivara-blink {
    0%, 87%, 100% { opacity: 0; }
    90%, 92%      { opacity: 1; }
  }
  @keyframes capivara-blink-slow {
    0%, 93%, 100% { opacity: 0; }
    95%, 97%      { opacity: 1; }
  }
  @keyframes capivara-look-up {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }
  @keyframes capivara-eye-dart {
    0%, 55%, 100% { transform: translateX(0); }
    60%           { transform: translateX(5px); }
    70%           { transform: translateX(-5px); }
    85%           { transform: translateX(0); }
  }
  @keyframes capivara-listen {
    0%, 100% { transform: rotate(0deg); }
    50%      { transform: rotate(10deg); }
  }
  @keyframes capivara-bob {
    0%, 100% { transform: translateY(0); }
    25%      { transform: translateY(-6px); }
    60%      { transform: translateY(2px); }
  }
</style>
</head>
  <body>
    <div id="root">
      <!-- Splash screen inline — aparece instantaneamente enquanto o JS carrega -->
      <div id="splash" style="
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        height:100vh; width:100vw; background:#0b2231;
        font-family:'Inter',sans-serif; color:white;
      ">
        <div style="
          width:48px; height:48px; border:3px solid rgba(244,63,94,0.25);
          border-top-color:#f43f5e; border-radius:50%;
          animation: spin 0.8s linear infinite;
        "></div>
        <p style="margin-top:20px; font-size:14px; opacity:0.6; letter-spacing:0.5px;">Carregando Nadia...</p>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Registrar Service Worker para cache offline (PWA)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
